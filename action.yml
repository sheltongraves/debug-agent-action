name: 'LocalStack Debug Agent'
description: 'Uses Claude AI to autonomously diagnose AWS infrastructure failures via the LocalStack App Inspector API.'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key for Claude'
    required: true
  localstack-endpoint:
    description: 'LocalStack endpoint URL'
    required: false
    default: 'http://localhost:4566'
  report-path:
    description: 'Path to save the debug report JSON'
    required: false
    default: '/tmp/debug_report.json'
  upload-artifact:
    description: 'Upload debug_report.json as a GitHub Actions artifact'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for posting PR comments (pass secrets.GITHUB_TOKEN)'
    required: false
    default: ''

outputs:
  report-path:
    description: 'Path to the saved debug report'
    value: ${{ inputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Install agent dependencies
      shell: bash
      run: pip3 install anthropic requests

    - name: Run LocalStack debug agent
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        LOCALSTACK_ENDPOINT: ${{ inputs.localstack-endpoint }}
        REPORT_PATH: ${{ inputs.report-path }}
      run: python3 ${{ github.action_path }}/agent.py

    - name: Upload debug report
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: debug-report
        path: ${{ inputs.report-path }}

    - name: Extract diagnosis for PR comment
      shell: bash
      run: |
        python3 - <<'EOF'
        import json, sys
        try:
            with open("${{ inputs.report-path }}") as f:
                data = json.load(f)
            diagnosis = data.get("diagnosis", "No diagnosis available.")
            comment = "## LocalStack Debug Agent\n\n" + diagnosis + "\n\n---\n*Full trace data available in the `debug-report` artifact.*"
            with open("/tmp/ls_diagnosis_comment.txt", "w") as f:
                f.write(comment)
        except Exception as e:
            print(f"Could not extract diagnosis: {e}", file=sys.stderr)
        EOF

    - name: Post diagnosis as PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.github-token != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr comment ${{ github.event.pull_request.number }} \
          --repo ${{ github.repository }} \
          --body-file /tmp/ls_diagnosis_comment.txt
